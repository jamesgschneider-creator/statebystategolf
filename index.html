<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>State by State Golf | Hayley & Jim</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Georgia', serif;
    background: #0f2027;
    color: #f0ece0;
    min-height: 100vh;
  }

  header {
    background: #1a3a2a;
    border-bottom: 2px solid #4a7c59;
    padding: 2rem 1rem;
    text-align: center;
  }

  header h1 { font-size: 2.6rem; color: #c8a951; letter-spacing: 0.05em; }
  header p { color: #a8c5a0; font-size: 1rem; margin-top: 0.4rem; letter-spacing: 0.08em; }

  .instagram-link {
    display: inline-block;
    margin-top: 0.8rem;
    color: #c8a951;
    text-decoration: none;
    font-size: 0.9rem;
    border: 1px solid #c8a951;
    padding: 0.3rem 1.2rem;
    border-radius: 20px;
    transition: all 0.2s;
  }
  .instagram-link:hover { background: #c8a951; color: #0f2027; }

  .progress-section {
    background: #162d1f;
    padding: 2rem 1rem;
    text-align: center;
    border-bottom: 1px solid #2d5a3d;
  }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 4rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .stat-number { font-size: 3.5rem; color: #c8a951; line-height: 1; font-weight: bold; }
  .stat-label { color: #a8c5a0; font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 0.3rem; }

  .progress-track {
    max-width: 500px;
    margin: 0 auto;
    background: #0f2027;
    border-radius: 10px;
    height: 16px;
    overflow: hidden;
    border: 1px solid #2d5a3d;
  }
  .progress-fill {
    height: 100%;
    width: 26%;
    background: linear-gradient(90deg, #4a7c59, #c8a951);
    border-radius: 10px;
  }
  .progress-label { color: #7a9e8a; font-size: 0.8rem; margin-top: 0.5rem; }

  .map-section {
    padding: 2rem 1rem;
    text-align: center;
    max-width: 960px;
    margin: 0 auto;
  }

  .map-section h2 { color: #c8a951; font-size: 1.3rem; margin-bottom: 1rem; letter-spacing: 0.05em; }

  #map { width: 100%; background: #0f2027; border-radius: 12px; overflow: hidden; }

  .map-legend {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; color: #a8c5a0; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; }

  .log-section {
    padding: 2rem 1rem;
    max-width: 1000px;
    margin: 0 auto;
  }
  .log-section h2 { color: #c8a951; font-size: 1.3rem; margin-bottom: 1.5rem; letter-spacing: 0.05em; text-align: center; }

  .course-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }

  .course-card {
    background: #1a3a2a;
    border: 1px solid #2d5a3d;
    border-left: 4px solid #c8a951;
    border-radius: 0 8px 8px 0;
    padding: 1.1rem 1.2rem;
    transition: transform 0.15s;
  }
  .course-card:hover { transform: translateY(-2px); }

  .card-state { font-size: 0.7rem; color: #c8a951; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.25rem; }
  .card-course { font-size: 1rem; font-weight: bold; color: #f0ece0; margin-bottom: 0.2rem; line-height: 1.3; }
  .card-city { font-size: 0.82rem; color: #a8c5a0; margin-bottom: 0.5rem; }
  .card-date { font-size: 0.78rem; color: #7a9e8a; }

  .map-tooltip {
    position: fixed;
    background: #1a3a2a;
    border: 1px solid #c8a951;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    font-family: Georgia, serif;
    color: #f0ece0;
    pointer-events: none;
    display: none;
    z-index: 999;
    line-height: 1.5;
  }

  footer {
    text-align: center;
    padding: 2rem 1rem;
    border-top: 1px solid #2d5a3d;
    color: #4a7c59;
    font-size: 0.78rem;
    margin-top: 2rem;
  }

  .visitor-counter {
    margin-top: 1.2rem;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
  }
  .visitor-counter .stat-number {
    font-size: 1.8rem;
  }
  .visitor-counter .stat-label {
    margin-top: 0.15rem;
  }
</style>
</head>
<body>

<header>
  <h1>⛳ State by State Golf</h1>
  <p>Hayley & Jim &middot; Playing all 50 US States</p>
  <a class="instagram-link" href="https://instagram.com/statebystategolf" target="_blank">&#128247; @statebystategolf</a>
</header>

<div class="progress-section">
  <div class="stats-row">
    <div class="stat">
      <div class="stat-number">13</div>
      <div class="stat-label">States Played</div>
    </div>
    <div class="stat">
      <div class="stat-number">37</div>
      <div class="stat-label">Remaining</div>
    </div>
    <div class="stat">
      <div class="stat-number">26%</div>
      <div class="stat-label">Complete</div>
    </div>
  </div>
  <div class="progress-track"><div class="progress-fill"></div></div>
  <div class="progress-label">13 of 50 states</div>
</div>

<div class="map-section">
  <h2>States Played</h2>
  <div id="map"></div>
  <div class="map-legend">
    <div class="legend-item">
      <div class="legend-swatch" style="background:#c8a951;"></div>
      <span>Played (13)</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:#2d5a3d;"></div>
      <span>Not yet played (37)</span>
    </div>
  </div>
</div>

<div class="log-section">
  <h2>Course Log</h2>
  <div class="course-grid" id="course-grid"></div>
</div>

<footer>
  <p>Hayley & Jim &middot; State by State Golf Challenge &middot; @statebystategolf</p>
  <div class="visitor-counter">
    <div class="stat-number" id="page-view-count">&mdash;</div>
    <div class="stat-label">Page Views</div>
  </div>
</footer>

<div class="map-tooltip" id="map-tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
const courses = [
  { state:"New York",        course:"Merrick Golf Course",               city:"Merrick",           date:"August 15, 2021" },
  { state:"Pennsylvania",    course:"Saucon Valley Weyhill Course",      city:"Bethlehem",         date:"July 31, 2024" },
  { state:"Connecticut",     course:"Keney Park Golf Course",            city:"Windsor",           date:"August 12, 2024" },
  { state:"Massachusetts",   course:"Springfield Country Club",          city:"West Springfield",  date:"August 13, 2024" },
  { state:"Hawaii",          course:"The Ocean Course at Hokuala",       city:"Lihue",             date:"January 14, 2025" },
  { state:"Florida",         course:"The Ritz Golf Course",              city:"Orlando",           date:"February 9, 2025" },
  { state:"Ohio",            course:"Muirfield Village Golf Club",       city:"Dublin",            date:"June 20, 2025" },
  { state:"Delaware",        course:"Bidermann Golf Club",               city:"Wilmington",        date:"August 8, 2025" },
  { state:"Maryland",        course:"Spring Green Valley Hunt Club",     city:"Owings Mills",      date:"August 9, 2025" },
  { state:"Rhode Island",    course:"Misquamicut Club",                  city:"Westerly",          date:"October 4, 2025" },
  { state:"Georgia",         course:"The Landings Magnolia Golf Course", city:"Savannah",          date:"April 1, 2026" },
  { state:"South Carolina",  course:"Long Cove Club",                    city:"Hilton Head Island",date:"April 2, 2026" },
  { state:"New Jersey",      course:"Ridgewood Country Club",            city:"Paramus",           date:"April 12, 2026" },
];

const playedNames = new Set(courses.map(c => c.state));
const courseByState = {};
courses.forEach(c => courseByState[c.state] = c);

courses.sort((a,b) => new Date(a.date) - new Date(b.date));
const grid = document.getElementById('course-grid');
courses.forEach(c => {
  const card = document.createElement('div');
  card.className = 'course-card';
  card.innerHTML = `
    <div class="card-state">${c.state}</div>
    <div class="card-course">${c.course}</div>
    <div class="card-city">${c.city}</div>
    <div class="card-date">&#128197; ${c.date}</div>
  `;
  grid.appendChild(card);
});

const width = 900, height = 560;
const svg = d3.select('#map').append('svg')
  .attr('viewBox', `0 0 ${width} ${height}`)
  .attr('width', '100%');

const projection = d3.geoAlbersUsa().scale(1100).translate([width/2, height/2]);
const path = d3.geoPath(projection);
const tooltip = document.getElementById('map-tooltip');

d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(us => {
  const features = topojson.feature(us, us.objects.states).features;

  svg.selectAll('path')
    .data(features)
    .join('path')
    .attr('d', path)
    .attr('fill', d => playedNames.has(d.properties.name) ? '#c8a951' : '#2d5a3d')
    .attr('stroke', '#0f2027')
    .attr('stroke-width', 0.8)
    .style('cursor', d => playedNames.has(d.properties.name) ? 'pointer' : 'default')
    .on('mousemove', function(event, d) {
      const name = d.properties.name;
      if (!playedNames.has(name)) return;
      const c = courseByState[name];
      tooltip.style.display = 'block';
      tooltip.style.left = (event.clientX + 14) + 'px';
      tooltip.style.top = (event.clientY - 10) + 'px';
      tooltip.innerHTML = `<strong>${name}</strong><br>${c.course}<br>${c.city}<br>${c.date}`;
      d3.select(this).attr('fill','#e8c96a');
    })
    .on('mouseleave', function(event, d) {
      tooltip.style.display = 'none';
      d3.select(this).attr('fill', playedNames.has(d.properties.name) ? '#c8a951' : '#2d5a3d');
    });

  svg.selectAll('text.star')
    .data(features.filter(d => playedNames.has(d.properties.name)))
    .join('text')
    .attr('class','star')
    .attr('text-anchor','middle')
    .attr('dominant-baseline','middle')
    .attr('font-size', d => ['Rhode Island','Delaware','Connecticut','New Jersey','Maryland'].includes(d.properties.name) ? '9' : '14')
    .attr('transform', d => {
      const c = path.centroid(d);
      return c && !isNaN(c[0]) ? `translate(${c[0]},${c[1]})` : 'translate(-999,-999)';
    })
    .text('★')
    .style('pointer-events','none')
    .attr('fill','#0f2027');
});
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import {
    getFirestore, doc, getDoc, updateDoc, increment
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBSaeIcsTUayLEch9clREGG6h5Sl2AP9co",
    authDomain: "state-by-state-golf.firebaseapp.com",
    projectId: "state-by-state-golf",
    storageBucket: "state-by-state-golf.firebasestorage.app",
    messagingSenderId: "507849514481",
    appId: "1:507849514481:web:3bf657cdad66650e683850"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const counterRef = doc(db, "counters", "pageViews");

  async function trackPageView() {
    try {
      await updateDoc(counterRef, { count: increment(1) });
      const snap = await getDoc(counterRef);
      const count = snap.exists() ? snap.data().count : null;
      document.getElementById('page-view-count').textContent =
        count !== null ? count.toLocaleString() : '—';
    } catch (err) {
      console.error('Page view tracking failed:', err);
    }
  }

  trackPageView();
</script>
</body>
</html>
